[workspace]
members = ["rust/core", "rust/pyo3"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
authors = ["Charles Yeomans <charles@declaresub.com>"]
repository = "https://github.com/declaresub/abnf"

[workspace.dependencies]
abnf-core = { path = "rust/core", version = "0.1.0" }
caseless = "0.2"
lru = "0.12"
once_cell = "1"
pyo3 = "0.22"
smallvec = "1"
