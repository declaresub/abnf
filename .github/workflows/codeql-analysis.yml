name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '16 23 * * 5'

# Minimal workflow-level default.  The `analyze` job below overrides
# with a broader set; any future job added without its own
# `permissions:` block inherits this restrictive default instead of
# the runner's default-token permissions.
permissions:
  contents: read

# Cancel stale scans when a new commit lands on the same branch or
# PR.  Different branches still run in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read           # CodeQL inspects workflow run metadata when scanning Actions-related issues.
      contents: read          # Read the source tree being analyzed.
      security-events: write  # Upload SARIF results to the repo's Code Scanning UI.

    strategy:
      fail-fast: false
      matrix:
        # Both languages use `build-mode: none` — CodeQL extracts
        # directly from source for Python (interpreted) and for Rust
        # (the analyzer parses Cargo workspaces without compiling).
        include:
          - language: python
            build-mode: none
          - language: rust
            build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a  # v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a  # v3
      with:
        # Category disambiguates the python and rust SARIF uploads in
        # the Code Scanning UI when both finish for the same commit.
        category: "/language:${{ matrix.language }}"
