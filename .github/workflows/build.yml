name: Build Package
on: workflow_dispatch

# Minimal default token permissions.  Building the wheel only needs
# read access; `upload-artifact` within the same workflow run does
# not require special permissions.
permissions:
  contents: read

# This workflow is manually triggered (workflow_dispatch).  Cancel a
# previous run if the user re-triggers before it finishes — there's
# no benefit to keeping a stale build around.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: python-package-distributions
        path: dist/
