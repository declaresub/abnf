name: Build Package
on: workflow_dispatch

# Minimal default token permissions.  Building the wheel only needs
# read access; `upload-artifact` within the same workflow run does
# not require special permissions.
permissions:
  contents: read

# This workflow is manually triggered (workflow_dispatch).  Cancel a
# previous run if the user re-triggers before it finishes — there's
# no benefit to keeping a stale build around.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: python-package-distributions
        path: dist/
