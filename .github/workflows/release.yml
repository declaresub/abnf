name: Release

# Triggered by `v*` git tags.  Builds and publishes BOTH `abnf`
# (pure Python) and `abnf-rust` (the compiled extension) as a
# single atomic release.  Either both packages publish at version
# X.Y.Z, or neither does — keeps `pip install abnf[rust]` from
# failing to resolve because one half of the release didn't make it.

on:
  push:
    tags:
      - v*

# Minimal default token permissions.  Publish and release jobs
# override with the narrowest set they need (id-token for trusted
# publishing, contents:write for the GitHub release).
permissions:
  contents: read

# Serialize concurrent runs but never cancel an in-flight publish:
# a partial release across two PyPI projects + five wheels +
# Sigstore signing is harder to recover from than a queued run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------
  # Build
  # ----------------------------------------------------------------

  build-abnf:
    name: Build abnf distribution
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ github.ref }}
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.x"

    - name: Install pypa/build
      run: python3 -m pip install --user build

    - name: Build sdist + wheel
      # setuptools-scm picks the version up from the tag itself.
      run: python3 -m build

    - name: Generate CycloneDX SBOM
      # Describes the runtime dependency closure a user actually
      # installs (`pip install abnf[rust]`), read from the committed
      # uv.lock — NOT the dev toolchain.  Written to sbom/ rather than
      # dist/ so it is never swept into the PyPI upload (a stray file
      # in dist/ would be published to the index and can break the
      # publish).  It is attached to the GitHub release at the end.
      # uv and cyclonedx-bom are version-pinned for reproducibility.
      run: |
        python3 -m pip install --user 'uv==0.11.8'
        export PATH="$HOME/.local/bin:$PATH"
        mkdir -p sbom
        uv export --no-dev --extra rust --no-hashes --no-emit-project \
          --format requirements-txt -o sbom/requirements.txt
        uvx --from 'cyclonedx-bom==7.3.0' cyclonedx-py requirements \
          sbom/requirements.txt --output-format JSON > sbom/abnf.cdx.json

    - name: Upload abnf dists
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: abnf-dists
        path: dist/

    - name: Upload SBOM
      # Separate artifact (not abnf-dists) so the publish jobs, which
      # download only abnf-dists / abnf-rust-*, never see it.  Only the
      # final github-release job (which downloads every artifact) picks
      # it up and attaches it to the release.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: abnf-sbom
        path: sbom/abnf.cdx.json

  build-abnf-rust-sdist:
    name: Build abnf-rust sdist
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ github.ref }}
        persist-credentials: false

    - name: Set abnf-rust crate version from the tag
      shell: python
      # Cargo doesn't have an equivalent of setuptools-scm, so we
      # rewrite the workspace version (and the inline abnf-core dep
      # ref) from the tag at build time.  Done in Python so the
      # same step works on Linux, macOS, and Windows.
      run: |
        import os, re, pathlib
        version = os.environ["GITHUB_REF_NAME"].lstrip("v")
        path = pathlib.Path("packages/abnf-rust/Cargo.toml")
        text = path.read_text()
        text = re.sub(
            r'^version = "[^"]+"',
            f'version = "{version}"',
            text,
            flags=re.MULTILINE,
        )
        text = re.sub(
            r'(abnf-core = \{ path = "rust/core", version = )"[^"]+"',
            rf'\1"{version}"',
            text,
        )
        path.write_text(text)
        print(f"Set abnf-rust version to {version}")

    - name: Build sdist
      uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
      with:
        working-directory: packages/abnf-rust
        command: sdist
        args: --out dist

    - name: Upload abnf-rust sdist
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: abnf-rust-sdist
        path: packages/abnf-rust/dist/*.tar.gz

  build-abnf-rust-wheel:
    name: Build abnf-rust wheel (${{ matrix.target.label }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Use `manylinux: 2_28` (CentOS 8 / gcc 8+) rather than the
          # default `auto` (which picks manylinux2014 / gcc 4.8.5).
          # libmimalloc-sys's build script passes `-Werror=date-time`,
          # which references the `-Wdate-time` option added in gcc 4.9
          # — the older toolchain fails to compile.  2_28 is the
          # recommended baseline since 2023; cost is dropping glibc
          # < 2.28 support (~CentOS 7 era).
          - label: linux-x86_64
            runner: ubuntu-latest
            maturin-target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - label: linux-aarch64
            runner: ubuntu-latest
            maturin-target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          # macos-13 is deprecated and `macos-14` is one major behind.
          # `macos-15-intel` and `macos-15` are the current GA Intel
          # and Apple Silicon labels per actions/runner-images; pin
          # explicitly rather than using `macos-latest`, which can
          # shift under us without warning.
          - label: macos-x86_64
            runner: macos-15-intel
            maturin-target: x86_64-apple-darwin
            manylinux: ""
          - label: macos-arm64
            runner: macos-15
            maturin-target: aarch64-apple-darwin
            manylinux: ""
          - label: windows-x86_64
            runner: windows-latest
            maturin-target: x86_64-pc-windows-msvc
            manylinux: ""

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ github.ref }}
        persist-credentials: false

    - name: Set abnf-rust crate version from the tag
      shell: python
      run: |
        import os, re, pathlib
        version = os.environ["GITHUB_REF_NAME"].lstrip("v")
        path = pathlib.Path("packages/abnf-rust/Cargo.toml")
        text = path.read_text()
        text = re.sub(
            r'^version = "[^"]+"',
            f'version = "{version}"',
            text,
            flags=re.MULTILINE,
        )
        text = re.sub(
            r'(abnf-core = \{ path = "rust/core", version = )"[^"]+"',
            rf'\1"{version}"',
            text,
        )
        path.write_text(text)

    - name: Build wheel
      # sccache OFF on release builds: seal source rather than risk
      # a poisoned compilation cache reaching a release wheel.
      uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
      with:
        working-directory: packages/abnf-rust
        target: ${{ matrix.target.maturin-target }}
        args: --release --out dist
        manylinux: ${{ matrix.target.manylinux }}

    - name: Upload wheel
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: abnf-rust-wheel-${{ matrix.target.label }}
        path: packages/abnf-rust/dist/*.whl

  # ----------------------------------------------------------------
  # Publish abnf
  # ----------------------------------------------------------------

  publish-abnf-testpypi:
    name: Publish abnf to TestPyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build-abnf
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/abnf

    permissions:
      id-token: write  # mandatory for trusted publishing

    steps:
    - name: Download abnf dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: abnf-dists
        path: dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        # Make re-runs idempotent.  If a previous attempt for this
        # tag already uploaded the file, we skip rather than fail —
        # important when half the workflow failed partway through
        # and we need to retry without yanking what already
        # published.
        skip-existing: true
        # Generate & upload PEP 740 attestations (default, made
        # explicit so a future action default change can't silently
        # drop release provenance).
        attestations: true

  publish-abnf-pypi:
    name: Publish abnf to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - publish-abnf-testpypi
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/abnf

    permissions:
      id-token: write  # mandatory for trusted publishing

    steps:
    - name: Download abnf dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: abnf-dists
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        # Idempotent re-runs.  PyPI rejects duplicate filenames at
        # the project level, so this is purely a "skip what already
        # uploaded" hatch — version pinning still drives behaviour.
        skip-existing: true
        attestations: true

  # ----------------------------------------------------------------
  # Publish abnf-rust
  # ----------------------------------------------------------------

  publish-abnf-rust-testpypi:
    name: Publish abnf-rust to TestPyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build-abnf-rust-sdist
    - build-abnf-rust-wheel
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/abnf-rust

    permissions:
      id-token: write  # mandatory for trusted publishing

    steps:
    - name: Download all abnf-rust dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        pattern: abnf-rust-*
        merge-multiple: true
        path: dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true
        attestations: true

  publish-abnf-rust-pypi:
    name: Publish abnf-rust to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - publish-abnf-rust-testpypi
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/abnf-rust

    permissions:
      id-token: write  # mandatory for trusted publishing

    steps:
    - name: Download all abnf-rust dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        pattern: abnf-rust-*
        merge-multiple: true
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        skip-existing: true
        attestations: true

  # ----------------------------------------------------------------
  # Final fan-in: Sigstore-sign everything and create the release
  # ----------------------------------------------------------------

  github-release:
    name: Sign with Sigstore and create GitHub release
    needs:
    - publish-abnf-pypi
    - publish-abnf-rust-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Create the GitHub release.
      id-token: write  # Sigstore signing.

    steps:
    - name: Download every artifact from this workflow run
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        # `merge-multiple: true` collapses every uploaded artifact
        # into a single `dist/` so Sigstore signs them in one batch
        # and the GitHub release receives them all at once.
        merge-multiple: true
        path: dist/

    - name: Sign all dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl

    - name: Create the GitHub release with every artifact attached
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # One-shot create-and-upload so the release is compatible with
      # repo-level "immutable releases" enabled (which locks a
      # release at publish time — assets can't be added afterwards).
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        dist/*
        --repo "$GITHUB_REPOSITORY"
        --notes ""
